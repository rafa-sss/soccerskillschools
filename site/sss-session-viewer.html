<script>
  // ===== Drill library (must match the IDs used in Squarespace planner) =====
  const COMMON_IMAGE_URL = "https://images.squarespace-cdn.com/content/68c441422ebffe2e9bfd31ed/478d1f90-f662-475b-8a8d-0c21f856080d/Wide+Area+3+v+2+Half+Field+Game.jpg?content-type=image%2Fjpeg";
  const COMMON_VIDEO_URL = "https://drive.google.com/file/d/1X1EYi6gHGxeMwS69ID_ROCZYJoQRSMki/preview";
  const COMMON_PDF_URL   = "https://drive.google.com/file/d/1oudhsehdchdQSMV67dAs7EYXOJkOTon_/preview";

  const STATUS_HERO_DEFAULT_LOGO = "https://images.squarespace-cdn.com/content/68c441422ebffe2e9bfd31ed/a323dcda-562c-4f58-a955-c26cc0207bed/ISS-Logo.png?content-type=image%2Fpng";

  // =========================================================
  // DRILLS LIBRARY (Loaded from Google Sheets via Apps Script)
  // =========================================================
  const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxrwNK2By1uS8_EiX6Sx9tZ4Mpi4P0Z2JWA2H8tkE0Wl-87wakJDkK8ONiTujccHK5PxA/exec";

  // Match the planner tab names exactly
  const TAB_NAMES = [
    "Attacking",
    "Quarter/Three Quarter Turns",
    "Change of Direction",
    "Fake Change of Direction"
  ];

  const DRILL_CACHE_KEY = "sss_drills_cache_v2";
  const DRILL_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

  const SHARED_SESSION_CACHE_PREFIX = "sss_shared_session_v1:";
  const SHARED_SESSION_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

  const MAX_PDF_ACTIVITIES = 15;
  const MAX_PDF_ACTIVITIES_PER_PAGE = 4;

  let DRILLS = [];
  let DRILL_BY_ID = new Map();
  let currentPlan = null;

  function splitList(val) {
    const raw = (val || "").toString().trim();
    if (!raw) return [];

    let parts = raw.split(/[,，;|•·\n\r\/]+/g).map(s => s.trim()).filter(Boolean);

    if (parts.length === 1 && /\s{2,}/.test(raw)) {
      parts = raw.split(/\s{2,}/g).map(s => s.trim()).filter(Boolean);
    }

    const seen = new Set();
    const out = [];
    for (const p of parts) {
      const key = p.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      out.push(p);
    }
    return out;
  }

  function slugify(str) {
    return (str || "")
      .toLowerCase()
      .trim()
      .replace(/[^\w\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-");
  }

  function mapSheetRowsToDrills(rows) {
    const toTags = (val) => splitList(val);

    return (rows || []).map(r => {
      const name = r["Name"] || "";
      const id = r["ID"] || slugify(name);

      return {
        id,
        name,
        folder: r.__sheet || "",
        theme: r["Theme"] || "",
        category: r["Category"] || "",
        categoryRaw: r["Category"] || "",
        categories: splitList(r["Category"]),
        duration: r["Duration"] || "",
        tags: toTags(r["Tags"]),
        defaultNotes: r["Default Notes"] || "",
        imageUrl: r["Image URL (Squarespace)"] || "",
        driveImagePreviewUrl: r["Drive Image Preview URL"] || "",
        videoUrl: r["Video URL"] || "",
        pdfUrl: r["PDF URL"] || ""
      };
    }).filter(d => d.name);
  }

  function loadDrillsViaJSONP() {
    return new Promise((resolve, reject) => {
      if (!APPS_SCRIPT_WEBAPP_URL || APPS_SCRIPT_WEBAPP_URL.includes("PASTE_YOUR")) {
        reject(new Error("Apps Script Web App URL not set."));
        return;
      }

      try {
        const cachedRaw = localStorage.getItem(DRILL_CACHE_KEY);
        if (cachedRaw) {
          const cached = JSON.parse(cachedRaw);
          if (cached && Array.isArray(cached.rows) && (Date.now() - (cached.savedAt || cached.ts || 0) < DRILL_CACHE_TTL_MS)) {
            DRILLS = mapSheetRowsToDrills(cached.rows);
            DRILL_BY_ID = new Map(DRILLS.map(d => [d.id, d]));

            // Quiet background refresh
            jsonpFetch()
              .then(rows => {
                try {
                  localStorage.setItem(DRILL_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), ts: Date.now(), rows }));
                } catch (e) {}
              })
              .catch(() => {});

            resolve(DRILLS);
            return;
          }
        }
      } catch (e) {}

      jsonpFetch().then(rows => {
        try {
          localStorage.setItem(DRILL_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), ts: Date.now(), rows }));
        } catch (e) {}

        DRILLS = mapSheetRowsToDrills(rows);
        DRILL_BY_ID = new Map(DRILLS.map(d => [d.id, d]));
        resolve(DRILLS);
      }).catch(reject);

      function jsonpFetch() {
        return new Promise((res, rej) => {
          const cbName = "__sssDrillsCB_" + Math.random().toString(36).slice(2);
          const script = document.createElement("script");

          const cleanup = () => {
            try { delete window[cbName]; } catch (e) {}
            if (script && script.parentNode) script.parentNode.removeChild(script);
          };

          window[cbName] = (payload) => {
            cleanup();

            if (!payload) { rej(new Error("Empty response from Apps Script.")); return; }
            if (Array.isArray(payload)) { res(payload); return; }
            if (payload && Array.isArray(payload.rows)) { res(payload.rows); return; }
            if (payload && Array.isArray(payload.data)) { res(payload.data); return; }

            rej(new Error(payload && payload.error ? payload.error : "Unexpected response shape from Apps Script."));
          };

          const tabsParam = encodeURIComponent(TAB_NAMES.join(","));
          script.src = APPS_SCRIPT_WEBAPP_URL + "?callback=" + cbName + "&tabs=" + tabsParam;
          script.onerror = () => { cleanup(); rej(new Error("JSONP script failed to load.")); };

          document.head.appendChild(script);
        });
      }
    });
  }

  // Always attach the click handler (even if the link is missing/invalid).
  const pdfBtn = document.getElementById('download-pdf-btn');
  if (pdfBtn) {
    pdfBtn.addEventListener('click', () => {
      if (!currentPlan) {
        alert('No shared session found to print. Please open a valid shared link from the planner.');
        return;
      }
      if (isPlanExpired(currentPlan)) {
        alert('This shared session link has expired. Please contact your coach for a new link.');
        return;
      }
      downloadPdfFromPlan(currentPlan);
    });
  }

  // ===== Shared-session loading via Netlify proxy =====
  const SESSIONS_PROXY_URL = "/.netlify/functions/sss-sessions";

  function getSharedSessionIdFromUrl() {
    try {
      const params = new URLSearchParams(window.location.search);
      return String(params.get('s') || '').trim();
    } catch (e) {
      console.error('getSharedSessionIdFromUrl error', e);
      return '';
    }
  }

  function getSharedSessionCacheKey(sessionId) {
    return SHARED_SESSION_CACHE_PREFIX + String(sessionId || "").trim();
  }

  function readCachedSharedSession(sessionId) {
    try {
      const raw = localStorage.getItem(getSharedSessionCacheKey(sessionId));
      if (!raw) return null;

      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.savedAt || !parsed.session) return null;

      if (Date.now() - parsed.savedAt > SHARED_SESSION_CACHE_TTL_MS) return null;

      return parsed.session;
    } catch (e) {
      return null;
    }
  }

  function writeCachedSharedSession(sessionId, session) {
    try {
      localStorage.setItem(
        getSharedSessionCacheKey(sessionId),
        JSON.stringify({
          savedAt: Date.now(),
          session: session
        })
      );
    } catch (e) {}
  }

  async function fetchSharedSessionById(sessionId) {
    if (!sessionId) return { ok:false, error:'Missing session ID.' };

    try {
      const qs = new URLSearchParams({
        fn: 'getSharedSession',
        s: sessionId
      }).toString();

      const res = await fetch(SESSIONS_PROXY_URL + '?' + qs, {
        method: 'GET',
        cache: 'default',
        credentials: 'omit'
      });

      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch (parseErr) {
        data = null;
      }

      if (!res.ok) {
        return {
          ok:false,
          error:(data && data.error) ? data.error : (text || ('Request failed (' + res.status + ')'))
        };
      }

      if (!data || !data.ok || !data.session) {
        return {
          ok:false,
          error:(data && data.error) ? data.error : 'Shared session not found.'
        };
      }

      writeCachedSharedSession(sessionId, data.session);
      return data;
    } catch (e) {
      console.error('fetchSharedSessionById error', e);
      return {
        ok:false,
        error:(e && e.message) ? e.message : 'Could not load shared session.'
      };
    }
  }

  function parseSharedSessionPayload(session) {
    try {
      if (!session) return null;
      if (typeof session.payload === 'string') return JSON.parse(session.payload);
      if (session.payload && typeof session.payload === 'object') return session.payload;
      return null;
    } catch (e) {
      console.error('parseSharedSessionPayload error', e);
      return null;
    }
  }

  function isPlanExpired(plan) {
    if (!plan) return false;

    try {
      const now = new Date();
      let expiry = null;

      // Prefer explicit expiry from planner
      if (plan.expiry) {
        const e = new Date(plan.expiry);
        if (!isNaN(e.getTime())) {
          expiry = e;
        }
      }

      // Fallback: generatedAt + 90 days
      if (!expiry && plan.generatedAt) {
        const g = new Date(plan.generatedAt);
        if (!isNaN(g.getTime())) {
          expiry = new Date(g.getTime() + 90 * 24 * 60 * 60 * 1000);
        }
      }

      if (!expiry) return false;
      return now > expiry;
    } catch (err) {
      console.error('isPlanExpired error', err);
      return false;
    }
  }

  function formatExpiryForDisplay(plan) {
    if (!plan) return null;

    if (plan.expiry) {
      const e = new Date(plan.expiry);
      if (!isNaN(e.getTime())) return e;
    }

    if (plan.generatedAt) {
      const g = new Date(plan.generatedAt);
      if (!isNaN(g.getTime())) {
        return new Date(g.getTime() + 90 * 24 * 60 * 60 * 1000);
      }
    }

    return null;
  }

  function showExpiryOnPage(plan) {
    const el = document.getElementById('expiry-display');
    if (!el) return;

    const expiryDate = formatExpiryForDisplay(plan);
    if (!expiryDate) {
      el.style.display = 'none';
      return;
    }

    const pretty = expiryDate.toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });

    el.textContent = `Planner expires on ${pretty}`;
    el.style.display = 'block';
  }

  function resetStatusHeroLogo() {
    const logo = document.getElementById('session-status-hero-logo');
    if (!logo) return;

    logo.src = STATUS_HERO_DEFAULT_LOGO;
    logo.alt = 'Illinois Skill Schools logo';
    logo.classList.add('is-animating');
    logo.style.width = '';
    logo.style.maxWidth = '';
    logo.style.borderRadius = '';
    logo.style.border = '';
    logo.style.display = '';
    logo.style.margin = '';
    logo.style.height = '';
    logo.style.objectFit = '';
  }

  function setStatusHero(message, tone, animate) {
    const hero = document.getElementById('session-status-hero');
    const logo = document.getElementById('session-status-hero-logo');
    const text = document.getElementById('session-status-hero-text');
    const listEl = document.getElementById('activity-list');
    if (!hero || !logo || !text || !listEl) return;

    if (hero.parentNode !== listEl) {
      listEl.prepend(hero);
    }
    listEl.classList.add('is-loading');

    hero.hidden = false;
    hero.classList.remove('is-error', 'is-ok');
    if (tone === 'error') hero.classList.add('is-error');
    if (tone === 'ok') hero.classList.add('is-ok');

    resetStatusHeroLogo();
    logo.classList.toggle('is-animating', !!animate);
    text.textContent = message || '';
  }

  function hideStatusHero() {
    const hero = document.getElementById('session-status-hero');
    const listEl = document.getElementById('activity-list');
    if (hero) hero.hidden = true;
    if (listEl) listEl.classList.remove('is-loading');
    resetStatusHeroLogo();
  }

  function showThumbPreview(plan) {
    const hero = document.getElementById('session-status-hero');
    const logo = document.getElementById('session-status-hero-logo');
    const text = document.getElementById('session-status-hero-text');
    const listEl = document.getElementById('activity-list');

    if (!plan || !plan.__thumb || !hero || !logo || !text || !listEl) return;

    if (hero.parentNode !== listEl) {
      listEl.prepend(hero);
    }
    listEl.classList.add('is-loading');

    hero.hidden = false;
    hero.classList.remove('is-error', 'is-ok');

    logo.classList.remove('is-animating');
    logo.src = plan.__thumb;
    logo.alt = 'Session preview';
    logo.style.width = '100%';
    logo.style.maxWidth = '520px';
    logo.style.borderRadius = '14px';
    logo.style.border = '1px solid #e5e7eb';
    logo.style.display = 'block';
    logo.style.margin = '0 auto 8px';
    logo.style.height = 'auto';
    logo.style.objectFit = 'contain';

    text.textContent = 'Loading session…';
  }

  function showViewerStatusOnly(message, tone) {
    const listEl  = document.getElementById('activity-list');
    const metaEl  = document.querySelector('.session-meta');
    const labelEl = document.querySelector('.activities-label');
    const pdfBtn  = document.getElementById('download-pdf-btn');
    const expiredEl = document.getElementById('expired-message');

    if (listEl) {
      listEl.innerHTML = '';
      listEl.classList.add('is-loading');
    }

    if (metaEl) metaEl.style.display = 'none';
    if (labelEl) labelEl.style.display = 'none';
    if (expiredEl) expiredEl.style.display = 'none';
    if (pdfBtn) pdfBtn.disabled = true;

    setStatusHero(message, tone || 'error', false);
  }

  function showExpiredState(plan) {
    const expiredEl = document.getElementById('expired-message');
    if (expiredEl) expiredEl.style.display = 'none';
    showViewerStatusOnly('This shared session link has expired. Please contact your coach for a new link.', 'error');
  }

  // ===== Video modal controls =====
  const videoModal  = document.getElementById('video-modal');
  const videoFrame  = document.getElementById('video-iframe');
  const videoClose  = document.getElementById('video-close');

  function openVideo(url) {
    if (!url) return;
    videoFrame.src = url;
    videoModal.classList.add('is-visible');
  }

  function closeVideo() {
    videoFrame.src = '';
    videoModal.classList.remove('is-visible');
  }

  videoClose.addEventListener('click', closeVideo);
  videoModal.addEventListener('click', (e) => {
    if (e.target === videoModal) closeVideo();
  });

  // ===== Render the shared session =====
  function renderSession(plan, options) {
    options = options || {};
    const dateEl   = document.getElementById('meta-date');
    const coachEl  = document.getElementById('meta-coach');
    const ageEl    = document.getElementById('meta-age');
    const themeEl  = document.getElementById('meta-theme');
    const listEl   = document.getElementById('activity-list');
    const metaEl   = document.querySelector('.session-meta');
    const labelEl  = document.querySelector('.activities-label');

    if (metaEl) metaEl.style.display = '';
    if (labelEl) labelEl.style.display = '';

    dateEl.textContent  = plan.date || '';
    coachEl.textContent = plan.coach || '';
    ageEl.textContent   = plan.ageGroup || '';
    themeEl.textContent = plan.theme || '';

    const rows = Array.isArray(plan.rows) ? plan.rows : [];
    if (!rows.length) {
      setStatusHero('No activities found in this shared session.', 'error', false);
      listEl.innerHTML = '';
      return;
    }

    if (!options.keepStatusHero) {
      hideStatusHero();
      listEl.innerHTML = '';
    } else {
      const hero = document.getElementById('session-status-hero');
      const preservedHero = hero && hero.parentNode === listEl ? hero : null;
      listEl.innerHTML = '';
      if (preservedHero) listEl.appendChild(preservedHero);
    }

    const pdfBtnLocal = document.getElementById('download-pdf-btn');
    if (pdfBtnLocal) pdfBtnLocal.disabled = false;

    rows.forEach((row, index) => {
      const drill = DRILL_BY_ID.get(row.drillId) || {};
      const fallbackDrill = {
        name: row.drillName || '',
        imageUrl: row.imageUrl || '',
        videoUrl: row.videoUrl || '',
        pdfUrl: row.pdfUrl || '',
        defaultNotes: row.defaultNotes || ''
      };
      const mergedDrill = Object.assign({}, fallbackDrill, drill || {});
      const imgUrl   = mergedDrill.imageUrl || '';
      const videoUrl = mergedDrill.videoUrl || '';
      const pdfUrl   = mergedDrill.pdfUrl   || '';
      const notes    = row.notes || mergedDrill.defaultNotes || '';
      const time     = row.time || '';

      const article = document.createElement('article');
      article.className = 'activity-row';

      article.innerHTML = `
        <div class="activity-visual">
          <div class="activity-visual-inner">
            ${
              imgUrl
                ? `<img src="${imgUrl}" alt="${mergedDrill.name || 'Session diagram'}">`
                : `<div style="padding:18px;color:#e5e7eb;font-size:11px;text-align:center;">Session diagram</div>`
            }
            <div class="activity-visual-hint">
              ${
                videoUrl
                  ? 'Click to watch demo video'
                  : (pdfUrl ? 'Click to open session PDF' : 'Click to open game resources')
              }
            </div>
          </div>
        </div>
        <div class="activity-notes">
          <h3>${index + 1}. ${mergedDrill.name || 'Activity'}</h3>
          ${time ? `<p class="activity-time"><strong>Time:</strong> ${time}</p>` : ''}
          ${
            notes
              ? `<p>${notes.replace(/\n/g,'<br>')}</p>`
              : ''
          }
          <div class="activity-links">
            ${pdfUrl ? `<a href="${pdfUrl}" target="_blank" rel="noopener">Session PDF</a>` : ''}
            ${videoUrl ? `<a href="${videoUrl}" target="_blank" rel="noopener">Video (open in new tab)</a>` : ''}
          </div>
        </div>
      `;

      const visual = article.querySelector('.activity-visual-inner');
      visual.addEventListener('click', () => {
        if (videoUrl) {
          openVideo(videoUrl);
        } else if (pdfUrl) {
          window.open(pdfUrl, '_blank');
        }
      });

      listEl.appendChild(article);
    });
  }

  // ===== PDF generation from shared plan =====
  function downloadPdfFromPlan(plan) {
    const rows = Array.isArray(plan.rows) ? plan.rows : [];
    const selectedRows = rows.filter(r => !!r.drillId);

    if (!selectedRows.length) {
      alert('This shared session has no games to print.');
      return;
    }
    if (selectedRows.length > MAX_PDF_ACTIVITIES) {
      alert('This shared session contains more than ' + MAX_PDF_ACTIVITIES + ' games. Please reduce the number in the planner.');
      return;
    }

    const dateVal  = plan.date || '';
    const coachVal = plan.coach || '';
    const ageVal   = plan.ageGroup || '';
    const themeVal = plan.theme || '';
    const isSafariPrint = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(navigator.userAgent || '');
    const isMobileSafariPrint = /iP(?:hone|ad|od)/i.test(navigator.userAgent || '') && isSafariPrint;
    const MAX_PER_PAGE = MAX_PDF_ACTIVITIES_PER_PAGE;
    const esc = (value) => String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
    const nl2br = (value) => esc(value).replace(/\n/g, '<br>');

    const pages = [];
    for (let i = 0; i < selectedRows.length; i += MAX_PER_PAGE) {
      pages.push(selectedRows.slice(i, i + MAX_PER_PAGE));
    }

    const pagesHtml = pages.map((pageRows, pageIndex) => {
      const rowsPerPage = pageRows.length;
      let minHeightPx = rowsPerPage >= 4 ? 210 : 250;
      if (isSafariPrint) {
        minHeightPx = rowsPerPage >= 4 ? 205 : 245;
      }
      if (isMobileSafariPrint) {
        minHeightPx = rowsPerPage >= 4 ? 190 : 230;
      }

      const activitiesHtml = pageRows.map((row, idxOnPage) => {
        const globalIndex = pageIndex * MAX_PER_PAGE + idxOnPage + 1;
        const drill = DRILL_BY_ID.get(row.drillId) || {};
        const fallbackDrill = {
          name: row.drillName || '',
          imageUrl: row.imageUrl || '',
          videoUrl: row.videoUrl || '',
          pdfUrl: row.pdfUrl || '',
          defaultNotes: row.defaultNotes || ''
        };
        const mergedDrill = Object.assign({}, fallbackDrill, drill || {});
        const notesText = row.notes || mergedDrill.defaultNotes || '';
        const timeText  = row.time || '';
        const imgUrl    = mergedDrill.imageUrl || '';

        return `
          <article class="sss-print-row" style="min-height:${minHeightPx}px;">
            <div class="sss-print-visual">
              ${
                imgUrl
                  ? `<img src="${esc(imgUrl)}" alt="${esc(mergedDrill.name || 'Session diagram')}">`
                  : '<div class="sss-print-visual__placeholder">Session diagram</div>'
              }
            </div>
            <div class="sss-print-notes">
              <h3 class="sss-print-activity-title">${globalIndex}. ${esc(mergedDrill.name || 'Activity')}</h3>
              ${timeText ? `<p class="sss-print-activity-time"><strong>Time:</strong> ${esc(timeText)}</p>` : ''}
              <div class="sss-print-notes__body">
                ${notesText ? `<p>${nl2br(notesText)}</p>` : ''}
              </div>
            </div>
          </article>
        `;
      }).join('');

      return `
        <section class="sss-print-page sss-print-page--${rowsPerPage}">
          <div class="sss-print-main">
            <header class="sss-print-header">
              <div class="sss-print-brand">
                <img
                  src="${STATUS_HERO_DEFAULT_LOGO}"
                  alt="Soccer Skill Schools logo"
                  class="sss-print-logo">
              </div>
              <div class="sss-print-title-block">
                <h1 class="sss-print-title">Interactive Session Plan</h1>
                <p class="sss-print-subtitle">Custom session built from the Soccer Skill Schools game library.</p>
              </div>
              <div class="sss-print-brand sss-print-brand--right">Session Plan</div>
            </header>
            <section class="sss-print-meta">
              <div>
                <div class="sss-print-field-label">Date</div>
                <div class="sss-print-field-value">${esc(dateVal)}</div>
              </div>
              <div>
                <div class="sss-print-field-label">Coach</div>
                <div class="sss-print-field-value">${esc(coachVal)}</div>
              </div>
              <div>
                <div class="sss-print-field-label">Age group</div>
                <div class="sss-print-field-value">${esc(ageVal)}</div>
              </div>
              <div>
                <div class="sss-print-field-label">Session theme</div>
                <div class="sss-print-field-value">${esc(themeVal)}</div>
              </div>
            </section>
            <section class="sss-print-activities sss-print-activities--${rowsPerPage}">
              ${activitiesHtml}
            </section>
          </div>
          <footer class="sss-print-footer">© 2016 Soccer Skill Schools. All rights reserved. This material is proprietary and may not be reproduced or distributed without express written permission.</footer>
        </section>
      `;
    }).join('');

    const printWindow = window.open('', '_blank');
    if (!printWindow) return;

    printWindow.document.open();
    printWindow.document.write(`
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Session Plan – Soccer Skill Schools</title>
        <link rel="stylesheet" href="https://use.typekit.net/uda1vep.css">
        <style>
          @page { size: Letter portrait; margin: 0.26in; }
          * { box-sizing: border-box; }
          html, body {
            margin: 0;

    `);
    printWindow.document.close();
    printWindow.onload = function() {
      const firePrint = function() {
        setTimeout(function() {
          printWindow.focus();
          printWindow.print();
        }, 300);
      };
      try {
        const doc = printWindow.document;
        const imagePromises = Array.from(doc.images || []).map(img => {
          if (img.complete) return Promise.resolve();
          return new Promise(resolve => {
            const done = () => resolve();
            img.addEventListener('load', done, { once: true });
            img.addEventListener('error', done, { once: true });
          });
        });
        const fontsReady = doc.fonts && doc.fonts.ready ? doc.fonts.ready.catch(() => {}) : Promise.resolve();
        Promise.all([fontsReady].concat(imagePromises)).then(() => {
          if (isSafariPrint && printWindow.requestAnimationFrame) {
            printWindow.requestAnimationFrame(() => {
              printWindow.requestAnimationFrame(firePrint);
            });
          } else {
            firePrint();
          }
        });
      } catch (e) {
        firePrint();
      }
    };
  }

  function planNeedsDrillLibrary(plan) {
    const rows = Array.isArray(plan && plan.rows) ? plan.rows : [];
    if (!rows.length) return false;

    return rows.some(row => {
      const hasName  = !!String(row.drillName || "").trim();
      const hasImage = !!String(row.imageUrl || "").trim();
      const hasVideo = !!String(row.videoUrl || "").trim();
      const hasPdf   = !!String(row.pdfUrl || "").trim();
      return !(hasName && (hasImage || hasVideo || hasPdf));
    });
  }

  (async function init() {
    setStatusHero('Loading session…', '', true);

    const sessionId = getSharedSessionIdFromUrl();
    if (!sessionId) {
      showViewerStatusOnly('No shared session ID was found in this link.', 'error');
      return;
    }

    // 1) Try cached shared session first
    const cachedSession = readCachedSharedSession(sessionId);
    let cachedPlan = null;

    if (cachedSession) {
      cachedPlan = parseSharedSessionPayload(cachedSession);
      if (cachedPlan && !isPlanExpired(cachedPlan)) {
        currentPlan = cachedPlan;
        showExpiryOnPage(cachedPlan);
        renderSession(cachedPlan);
      } else if (cachedPlan && cachedPlan.__thumb) {
        showThumbPreview(cachedPlan);
      }
    }

    // 2) Fetch fresh session in background
    const sharedRes = await fetchSharedSessionById(sessionId);
    if (!sharedRes || !sharedRes.ok || !sharedRes.session) {
      if (!cachedPlan) {
        showViewerStatusOnly(
          (sharedRes && sharedRes.error) ? sharedRes.error : 'Could not load this shared session.',
          'error'
        );
      }
      return;
    }

    const freshPlan = parseSharedSessionPayload(sharedRes.session);
    if (!freshPlan) {
      if (!cachedPlan) {
        showViewerStatusOnly('This shared session did not contain a valid payload.', 'error');
      }
      return;
    }

    currentPlan = freshPlan;
    showExpiryOnPage(freshPlan);

    if (isPlanExpired(freshPlan)) {
      showExpiredState(freshPlan);
      return;
    }

    renderSession(freshPlan);

    // 3) Hydrate drills only if needed
    if (!planNeedsDrillLibrary(freshPlan)) return;

    loadDrillsViaJSONP()
      .then(() => {
        console.log('Loaded drills:', DRILLS.length);
        renderSession(freshPlan);
      })
      .catch((e) => {
        console.warn('Background drill hydrate failed:', e);
      });
  })();
</script>
